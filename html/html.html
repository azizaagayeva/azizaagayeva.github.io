<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fff8c6, #ffd1e7);
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      color: #3a2b4f;
    }
    .page {
      width: 90%;
      max-width: 760px;
      margin: 25px auto;
      padding: 15px;
    }
    .top {
      background: #ffffffcc;
      border: 4px dashed #ff9ce3;
      border-radius: 26px;
      padding: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }
    p {
      margin: 10px 0;
      line-height: 1.6;
    }
    .image {
      width: 100%;
      border-radius: 22px;
      margin: 18px 0;
      border: 3px solid #ffc5f0;
    }
    a {
      display: inline-block;
      background: #8f59ff;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <h1>HTML Page</h1>
      <p>This is the page you get when you click the HTML button. It is made by Aziza.</p>
      <p>HTML is the code for web pages. It is like writing with a pencil on a web page.</p>
      <a href="aboutme.html">Back to About Me</a>
    </div>

    <p>I like making pages with pictures and bright colors. I want my page to feel sweet and easy.</p>
  </div>
</body>
</html>
