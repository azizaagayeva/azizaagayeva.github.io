<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fff8c6, #ffd1e7);
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      color: #37304c;
    }
    .page {
      max-width: 760px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: #ffffffcc;
      border: 3px dashed #ff8fd8;
      border-radius: 28px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #5f2c7f;
    }
    p {
      margin: 10px 0;
      line-height: 1.6;
      font-size: 1rem;
    }
    .btn {
      display: inline-block;
      background: #7b52ff;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 18px;
      font-weight: bold;
      margin-top: 14px;
    }
    .image {
      width: 100%;
      border-radius: 24px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>HTML Page</h1>
      <p>This is the page you get when you click the HTML button. It is another cute page by Aziza.</p>
      <p>HTML is like a pencil for web pages. It makes headings, pictures, and buttons.</p>
      <img class="image" src="https://i.pinimg.com/originals/1b/93/7d/1b937d6d66d590abdbbfd988dc3bf9fd.gif" alt="Cute gif" />
      <a class="btn" href="aboutme.html">Back to About Me</a>
    </div>
  </div>
</body>
</html>
